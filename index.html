<section class="card">
            <div class="card-header">
                <span class="material-icons">place</span>
                <label>1. 行程節點 (Nodes)</label>
            </div>
            <div id="nodes-container">
                <div class="input-group">
                    <input class="node-input" placeholder="由哪裡出發？" autocomplete="off">
                </div>
                <div class="input-group">
                    <input class="node-input" placeholder="目的地在哪？" autocomplete="off">
                </div>
            </div>
            <div class="action-row" style="margin-top: 15px;">
                <button class="secondary-btn" onclick="addNode()">
                    <span class="material-icons">add_location</span> 中途站
                </button>
                <button class="secondary-btn" id="retBtn" onclick="toggleReturn()">
                    <span class="material-icons">sync</span> 往返模式
                </button>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <span class="material-icons">settings</span>
                <label>2. 偏好設定 (Settings)</label>
            </div>
            <div class="settings-group">
                <div class="setting-item">
                    <span>出發時間</span>
                    <input type="time" id="start-time" onchange="calculate()">
                </div>
                <div class="setting-item">
                    <span>充電方式</span>
                    <select id="car-model" onchange="calculate()">
                        <option value="0.160|3.85">Tesla Supercharger 繁忙 ($3.85)</option>
                        <option value="0.160|2.10">Tesla Supercharger 非繁忙 ($2.10)</option>
                        <option value="0.160|1.34">中電 EV 住宅高峰 ($1.34)</option>
                        <option value="0.160|0.91">中電 EV 住宅非高峰 ($0.91)</option>
                        <option value="0.180|0">免費充電站 (只計損耗)</option>
                    </select>
                </div>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="show-all-tunnels" onchange="smartFilterTunnels()"> 
                <span>顯示全港所有隧道 (手動模式)</span>
            </div>
        </section>
<div class="version-tag">v0.14</div>
<script src="app.js?v=0.14"></script>
